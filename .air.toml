root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/leeforge-example-service ./cmd/server"
  bin = "tmp/leeforge-example-service"
  exclude_dir = ["tmp", "vendor"]
  include_ext = ["go", "tpl", "tmpl", "html", "yaml"]
  delay = 1000
  stop_on_error = true

[log]
  time = true

[color]
  main = "cyan"
  secondary = "magenta"
  highlight = "white"
  warning = "yellow"
  error = "red"

[misc]
  clean_on_exit = true
