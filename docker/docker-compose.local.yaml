services:
  leeforge-examples:
    build:
      context: ../..
      dockerfile: examples/docker/Dockerfile
    image: leeforge-examples
    container_name: leeforge-examples
    ports:
      - "8081:8080"
    environment:
      - ENV_MODE=local
      - LEEFORGE_CACHE_HOST=redis7
      - LEEFORGE_CACHE_PORT=6379
      - LEEFORGE_DATABASE_HOST=postgres-18
      - LEEFORGE_DATABASE_PORT=5432
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - leeforge-network

networks:
  leeforge-network:
    external: true
